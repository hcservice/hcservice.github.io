<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>特定商取引法に基づく表記 | Hyper Core</title>
<style>
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif;background:#0c1222;color:#f2f4ff;line-height:1.7}
.wrap{max-width:860px;margin:60px auto;padding:24px}
h1{font-size:22px;margin-bottom:30px}
.item{margin-bottom:22px}
.label{font-weight:600;margin-bottom:6px}
.value{background:#151c33;padding:14px;border-radius:10px;font-size:14px}
</style>
</head>
<body>
<div class="wrap">

<h1>特定商取引法に基づく表記</h1>

<div class="item">
<div class="label">販売事業者名</div>
<div class="value">株式会社EDAMO</div>
</div>

<div class="item">
<div class="label">運営統括責任者</div>
<div class="value">請求があった場合、遅滞なく開示いたします。</div>
</div>

<div class="item">
<div class="label">所在地</div>
<div class="value">請求があった場合、遅滞なく開示いたします。</div>
</div>

<div class="item">
<div class="label">電話番号</div>
<div class="value">請求があった場合、遅滞なく開示いたします。</div>
</div>

<div class="item">
<div class="label">メールアドレス</div>
<div class="value">hypercore.service@gmail.com</div>
</div>

<div class="item">
<div class="label">販売価格</div>
<div class="value">各商品ページに税込価格を表示します。</div>
</div>

<div class="item">
<div class="label">支払方法</div>
<div class="value">クレジットカード決済等</div>
</div>

<div class="item">
<div class="label">商品の引渡時期</div>
<div class="value">決済確認後、即時ライセンスキーを発行します。</div>
</div>

<div class="item">
<div class="label">返品・返金</div>
<div class="value">デジタル商品の性質上、原則返品・返金はできません。</div>
</div>

</div>
</body>
</html>
